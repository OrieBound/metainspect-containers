AWSTemplateFormatVersion: '2010-09-09'
Description: GitHub -> CodePipeline -> CodeBuild pipeline for MetaInspect build/push/deploy.

Parameters:
  ProjectName:
    Type: String
    Default: metainspect
  EnvironmentName:
    Type: String
    Default: dev
  ConnectionArn:
    Type: String
    Description: CodeStar Connections ARN for GitHub.
  FullRepositoryId:
    Type: String
    Description: "GitHub org/repo (example: orie/metainspect)."
  BranchName:
    Type: String
    Default: main
  StackName:
    Type: String
    Default: metainspect-root-dev
  CloudFormationTemplatePrefix:
    Type: String
    Default: metainspect/templates
  BuildSpecFile:
    Type: String
    Default: buildspec.yml
    Description: Buildspec file to use. Set to buildspec-terraform.yml for Terraform pipeline.
  BuildImage:
    Type: String
    Default: aws/codebuild/standard:7.0

Resources:
  PipelineArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled

  # Nested stack TemplateURL points at HTTPS S3 objects. CodeBuild can sync objects, but
  # CloudFormation's service still needs s3:GetObject via bucket policy. This bucket is
  # created here so users do not pre-provision S3 or hand-edit policies.
  MetainspectCfnTemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  MetainspectCfnTemplatesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MetainspectCfnTemplatesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFormationReadNestedTemplates
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub
              - 'arn:aws:s3:::${Bucket}/${Prefix}/*'
              - Bucket: !Ref MetainspectCfnTemplatesBucket
                Prefix: !Ref CloudFormationTemplatePrefix
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # Terraform remote state (each account gets its own bucket; CodeBuild passes bucket/key at init).
  MetainspectTerraformStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codebuild-inline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub 'arn:aws:s3:::${PipelineArtifactsBucket}'
                  - !Sub 'arn:aws:s3:::${PipelineArtifactsBucket}/*'
                  - !Sub 'arn:aws:s3:::${MetainspectCfnTemplatesBucket}'
                  - !Sub 'arn:aws:s3:::${MetainspectCfnTemplatesBucket}/*'
                  - !Sub 'arn:aws:s3:::${MetainspectTerraformStateBucket}'
                  - !Sub 'arn:aws:s3:::${MetainspectTerraformStateBucket}/*'
                  - !Sub 'arn:aws:s3:::${ProjectName}-sample-${EnvironmentName}-*'
                  - !Sub 'arn:aws:s3:::${ProjectName}-sample-${EnvironmentName}-*/*'
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:PutBucketTagging
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketEncryption
                  - s3:PutBucketVersioning
                  - s3:GetBucketLocation
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeImages
                  - ecr:InitiateLayerUpload
                  - ecr:ListImages
                  - ecr:PutImageScanningConfiguration
                  - ecr:PutImageTagMutability
                  - ecr:GetLifecyclePolicy
                  - ecr:PutLifecyclePolicy
                  - ecr:DeleteLifecyclePolicy
                  - ecr:PutImage
                  - ecr:TagResource
                  - ecr:UntagResource
                  - ecr:ListTagsForResource
                  - ecr:UploadLayerPart
                Resource: !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-${EnvironmentName}'
              - Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:CreateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStackResources
                  - cloudformation:ListStacks
                  - cloudformation:UpdateStack
                  - cloudformation:ValidateTemplate
                Resource:
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${StackName}/*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${StackName}-*/*'
                  - !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:changeSet/*'
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:ListInstanceProfilesForRole
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:*
                  - elasticloadbalancing:*
                  - ecs:*
                  - elasticfilesystem:*
                  - logs:*
                  - application-autoscaling:*
                Resource: '*'

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-build-deploy'
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Source:
        Type: CODEPIPELINE
        BuildSpec: !Ref BuildSpecFile
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: !Ref BuildImage
        PrivilegedMode: true
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codepipeline-inline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${PipelineArtifactsBucket}'
                  - !Sub 'arn:aws:s3:::${PipelineArtifactsBucket}/*'
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref ConnectionArn

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub '${ProjectName}-${EnvironmentName}-pipeline'
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref PipelineArtifactsBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                ConnectionArn: !Ref ConnectionArn
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
                DetectChanges: true
              RunOrder: 1
        - Name: BuildAndDeploy
          Actions:
            - Name: CodeBuildRun
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref CodeBuildProject
                EnvironmentVariables: !Sub |
                  [
                    {"name":"AWS_REGION","value":"${AWS::Region}","type":"PLAINTEXT"},
                    {"name":"STACK_NAME","value":"${StackName}","type":"PLAINTEXT"},
                    {"name":"PROJECT_NAME","value":"${ProjectName}","type":"PLAINTEXT"},
                    {"name":"ENVIRONMENT_NAME","value":"${EnvironmentName}","type":"PLAINTEXT"},
                    {"name":"CFN_BUCKET","value":"${MetainspectCfnTemplatesBucket}","type":"PLAINTEXT"},
                    {"name":"CFN_TEMPLATE_PREFIX","value":"${CloudFormationTemplatePrefix}","type":"PLAINTEXT"},
                    {"name":"TF_STATE_BUCKET","value":"${MetainspectTerraformStateBucket}","type":"PLAINTEXT"},
                    {"name":"TF_STATE_KEY","value":"${ProjectName}/terraform/${EnvironmentName}/terraform.tfstate","type":"PLAINTEXT"}
                  ]
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  CodeBuildProjectName:
    Value: !Ref CodeBuildProject
  ArtifactsBucketName:
    Value: !Ref PipelineArtifactsBucket
  CfnTemplatesBucketName:
    Description: Bucket where nested templates are synced; includes policy for CloudFormation GetObject.
    Value: !Ref MetainspectCfnTemplatesBucket
  TerraformStateBucketName:
    Description: S3 bucket for Terraform remote state (CodeBuild TF_STATE_BUCKET).
    Value: !Ref MetainspectTerraformStateBucket
